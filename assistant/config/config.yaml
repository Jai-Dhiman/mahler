model:
  default: "openai/gpt-5-nano"
  provider: "openrouter"

terminal:
  backend: local

web:
  backend: tavily

# Discord settings (token, home_channel, allowed_users are set via env vars)
discord:
  require_mention: true
  auto_thread: false
  reactions: true

